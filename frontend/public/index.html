<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Community Help Platform</title>
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,kn,hi,ml,ta,gom',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </head>
  <body>
    <div id="google_translate_element" style="position: absolute; top: -1000px; left: -1000px; width: 1px; height: 1px; overflow: hidden;"></div>
    <div id="root"></div>
    <style>
      /* Hide all Google Translate UI elements (banners, tooltips, floating widgets) */
      .goog-te-banner-frame { display: none !important; }
      .skiptranslate > iframe.goog-te-banner-frame { display: none !important; }
      #goog-gt-tt { display: none !important; }
      .VIpgJd-ZVi9od-ORHb-OEVmcd { display: none !important; }
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf { display: none !important; }
      body > div.skiptranslate { display: none !important; }
      body { top: 0px !important; position: static !important; }
    </style>
  </body>
</html>
